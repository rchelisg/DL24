<!DOCTYPE html>
<html>
<head>
    <title>Purple Dot Test</title>
    <style>
        body {
            background-color: white;
            margin: 0;
            padding: 20px;
        }
        .yellow-area {
            background-color: #FFFFE0;
            width: 400px;
            height: 300px;
            position: relative;
        }
        .purple-dot {
            background-color: purple;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            position: absolute;
            bottom: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <div class="yellow-area">
        <div class="purple-dot"></div>
    </div>
</body>
</html>
